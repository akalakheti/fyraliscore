# =====================================================================
# Goals (6) — strategic + operational, owners spread across leadership.
# =====================================================================
goals:
  - { goal_id: G-1-arr-target,        title: "Hit $10M ARR by EOY",                              owner_actor_id: diana,  altitude: strategic,  description: "Series B fundraise readiness depends on a clean run rate at $10M ARR by Q4. All GTM commitments roll up here.", target_offset_days: 270 }
  - { goal_id: G-2-multi-crm,         title: "Ship multi-CRM forecast pipeline",                 owner_actor_id: sanjay, altitude: operational, description: "Salesforce + HubSpot + Pipedrive forecast ingest stable; nightly forecast model consumes from all three.", target_offset_days: 180 }
  - { goal_id: G-3-renewal-90,        title: "Achieve 90% gross renewal rate",                   owner_actor_id: priya,  altitude: operational, description: "Health-scoring + save-play playbook landed across the CS org; 90% gross renewal across the FY.", target_offset_days: 270 }
  - { goal_id: G-4-incident-halve,    title: "Reduce P1 incidents by 50%",                       owner_actor_id: tom,    altitude: operational, description: "P1 incident rate halved by Q3. Driven by Salesforce sync stabilization and observability tooling.", target_offset_days: 210 }
  - { goal_id: G-5-conv-ai-v1,        title: "Ship conversation-AI module v1",                   owner_actor_id: sanjay, altitude: operational, description: "Conversation-AI module taps into Gong/Chorus call recordings and surfaces deal risk signals. Q3 release.", target_offset_days: 240 }
  - { goal_id: G-6-vp-eng-successor,  title: "Hire VP Eng successor",                            owner_actor_id: olu,    altitude: operational, description: "Open after Tom's departure (m5). Needed before Q4 to unblock the forecast model release.", target_offset_days: 240 }

# =====================================================================
# Decisions (5) — material company choices captured early in the window.
# =====================================================================
decisions:
  - { decision_id: D-1-crm-in-house,  title: "Build CRM connectors in-house vs partner",         decision_text: "We'll build the Salesforce/HubSpot/Pipedrive connectors in-house rather than partner with Workato/Tray.", rationale: "Owning the ingest layer is core to our data quality story. Partner adds latency and limits what we can do for design partners.", decided_offset_days: -30 }
  - { decision_id: D-2-conv-ai-first, title: "Roll out conversation-AI before ICP scoring",      decision_text: "Conversation-AI v1 ships ahead of ICP scoring. ICP scoring stays in research.", rationale: "Conversation-AI is a clearer wedge for design partners. ICP scoring is a longer model-build cycle.", decided_offset_days: -14 }
  - { decision_id: D-3-snowflake,     title: "Adopt Snowflake as data lake (over BigQuery)",     decision_text: "Snowflake replaces our BigQuery dual-writes. Migration completes Q2.", rationale: "Snowflake's cost model is better for our usage shape; design partners are already on Snowflake.", decided_offset_days: -45 }
  - { decision_id: D-4-uk-ae,         title: "Open a UK-based AE seat",                          decision_text: "First non-US AE; remote, London-based.", rationale: "European pipeline has been growing organically; we need a local time zone for late-stage demos.", decided_offset_days: 30 }
  - { decision_id: D-5-pricing-model, title: "Usage-based vs seat-based pricing for new tier",   decision_text: "Stay with seat-based for Q1; revisit usage-based at the post-Series B board.", rationale: "Usage-based pricing creates renewal risk for our smaller mid-market accounts; seat-based predictable for now.", decided_offset_days: 14 }

