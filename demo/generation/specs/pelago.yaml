# Pelago — Series A B2B SaaS revenue-intelligence platform.
# Single source of truth for both the LSOB simulator (lsob-simulation)
# and the demo SQL snapshot bundler (demo/generation/built/pelago.py).
company_id: pelago
seed: 42
start_date: "2026-01-01T00:00:00Z"
duration_months: 9                  # 270 simulated days
commitment_generation_rate: 0.04
num_actors: 35                      # validator anchor; profiles drive actual count
customer_count: 28
actor_personality_distribution:
  reliable: 0.5
  optimistic: 0.3
  pessimistic: 0.1
  flaky: 0.1

# 100-200 signals/day baseline; 400-500/day in the ±14d windows around each
# turbulence event. Approx 35-50k signals total over 270 days.
signal_density:
  baseline_min: 100
  baseline_max: 200
  crisis_min: 400
  crisis_max: 500
  crisis_window_days: 14

company_metadata:
  company_name: Pelago
  ceo_actor_id: diana
  vertical: b2b_saas_revops
  tagline: "Series A, prosumer-priced AI forecasting hitting enterprise sales orgs."
  description: >-
    35-person B2B SaaS revenue-intelligence platform. Just closed a $14M
    Series A. Sells forecast accuracy + revenue intelligence to mid-market
    and enterprise SaaS sales orgs. Customers: Beacon Analytics, Northvale
    Insights, Conduit Software (3 anchor design partners) plus 25 mid-market
    accounts and prospects. 9-month window: anchor design-partner churn at
    month 3, VP Eng departs at month 5, reorg at month 7.

