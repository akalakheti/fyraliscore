# Truss — Series A, founder at full cognitive load.
# Source: DEMO-BUILD-PLAN.md "The three preloaded companies" (Company A).
company_id: truss
company_name: Truss
tagline: Series A, founder at full cognitive load
ceo_name: Maya Patel
ceo_email: maya@truss.dev
description: >-
  40-person AI-native developer infrastructure company. Just closed a
  $12M Series A. The founder is operating at full cognitive load — too
  many customers to track in her head, too many parallel workstreams,
  too many decisions whose rationale is fading.

# Counts. The validator allows ±10%; treat these as the design target.
actor_count: 40
customer_count: 35
customer_arr_total: 4500000      # ~$4.5M ARR (early-stage paying)
prospect_count: 18
goal_count: 7
decision_count: 6
commitment_count: 140
signal_window_days: 270          # 9 months of accumulated signal history
recommendation_count: 7

# Role distribution mirrors the spec (8 eng, 2 PM, 6 GTM, 4 ops/leadership,
# 4-6 contractors). Reporting depth 2-3 layers.
role_mix:
  engineer: 8
  pm: 2
  gtm: 6
  ops_leadership: 4
  contractor_advisor: 5
  founder: 2          # CEO + co-founder
  designer: 2
  marketing: 2
  customer_success: 3
  recruiter: 1
  finance: 1
  legal_advisor: 1
reporting_depth: 3

# The recommendation list the action list must surface (priority order).
recommendations:
  - kind: capacity
    proposition: Engineering at ~95% utilization — pause new commitments before saturation
    impact_usd: 95000
  - kind: customer_pressure
    proposition: 3 design partners requested SSO in past 60 days — $280K ARR exposure
    impact_usd: 280000
  - kind: personnel
    proposition: Lead engineer on incident rotation 4 of 6 weeks — burnout pattern emerging
    impact_usd: 50000
  - kind: decision_revisit
    proposition: API redesign commitment predates 3 customer requests for stable v1 — re-scope
    impact_usd: 120000
  - kind: strategic
    proposition: Roadmap has 8 active workstreams; 3 lack customer demand signal
    impact_usd: 200000
  - kind: founder_context
    proposition: 3 weeks since founder-VP Eng sync; 2 open roles blocking critical path
    impact_usd: 75000
  - kind: customer_pressure
    proposition: Smaller account showing health drift over 30 days
    impact_usd: 40000
