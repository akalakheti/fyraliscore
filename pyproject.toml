[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "company-os"
version = "0.0.0"
description = "Company OS — organizational intelligence runtime"
requires-python = ">=3.11"
readme = "README.md"

dependencies = [
    "asyncpg>=0.29",
    "pgvector>=0.3",
    "pydantic>=2.7",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "httpx>=0.27",
    "structlog>=24.1",
    "python-dotenv>=1.0",
    "psycopg2-binary>=2.9",      # used only by scripts/check_schema_drift.py (sync)
    "anthropic>=0.34",
    "openai>=1.40",
    "zstandard>=0.22",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.1",
    "pytest-asyncio>=0.23",
    "pytest-timeout>=2.3",
    "hypothesis>=6.100",
    "respx>=0.21",              # httpx mocking for unit tests
    "freezegun>=1.5",
    "hdbscan>=0.8.40",          # Wave 4-C precipitation clustering
    "scikit-learn>=1.4",        # transitive via hdbscan; used by precipitation
    "numpy>=2.0",               # transitive; model-embedding stacking
    "pyyaml>=6.0",              # real-LLM scenario YAML loader
]

[tool.setuptools.packages.find]
where = ["."]
include = ["lib*", "services*"]
exclude = ["tests*", "ui*"]
namespaces = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests", "lib", "services"]
python_files = ["test_*.py", "*_test.py"]
timeout = 30
filterwarnings = [
    "error",
    "ignore::DeprecationWarning:pydantic.*",
    "ignore::DeprecationWarning:asyncpg.*",
    # asyncpg / asyncio selector can log unclosed-connection warnings
    # from __del__ deallocators during pytest teardown. These are not
    # actionable from test code and surface as PytestUnraisableException.
    "ignore::ResourceWarning",
    "ignore::pytest.PytestUnraisableExceptionWarning",
]
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
    # Known-broken tests already failing on origin/main when CI was
    # introduced (PR #14). Tracked for follow-up; deselected here so
    # CI can gate new work without rewriting unrelated suites.
    "--deselect=tests/integration/test_recommendation_flow.py::test_full_recommendation_flow_lists_acts_archives",
    "--deselect=tests/integration/test_recommendation_flow.py::test_act_after_archive_returns_409",
    "--deselect=services/recommendations/tests/test_api.py::test_act_transitions_target_commitment_and_archives",
    "--deselect=services/recommendations/tests/test_api.py::test_act_twice_returns_409",
    "--deselect=services/today/tests/test_derivations.py::test_derive_severity_buckets",
    "--deselect=services/today/tests/test_derivations.py::test_derive_severity_uses_default_impact_when_missing",
    "--deselect=services/today/tests/test_derivations.py::test_derive_category_operational_for_critical_transition",
    "--deselect=services/today/tests/test_today_api.py::test_today_lists_recommendations_with_severity_and_card_shape",
    "--deselect=services/models/tests/test_recommendations.py::test_recommendation_rejects_missing_target_actor_id",
    "--deselect=services/retrieval/tests/test_primary.py::test_t2_prediction_path_uses_a_and_d",
    "--deselect=lib/llm/tests/test_provider.py::test_config_from_env_defaults",
    "--deselect=lib/shared/tests/test_db.py::test_get_pool_uninitialised_raises",
    "--deselect=lib/shared/tests/test_db.py::test_init_pool_missing_dsn",
    # Flaky in full-suite runs (pass in isolation). Likely shared-DB
    # ordering / async teardown timing.
    "--deselect=services/realtime/tests/test_dispatcher.py::test_replay_since_sequence_num_ordered",
    "--deselect=services/today/tests/test_today_api.py::test_today_returns_full_payload_for_actor_with_no_recommendations",
]
markers = [
    "integration: requires live Postgres (DATABASE_URL)",
    "ollama: requires live Ollama (OLLAMA_URL)",
    "slow: slow test (> 1s)",
    "real_llm: real-LLM test (requires DEEPSEEK_API_KEY, runs only with RUN_REAL_LLM=1 or -m real_llm)",
]

[tool.ruff.lint.per-file-ignores]
# Re-export modules: __init__.py files import-and-export public API by
# convention; the imports look "unused" to ruff but are the entire point.
"**/__init__.py" = ["F401"]
# Pytest files import fixtures by name to make them visible to the test
# collector and then re-bind them as parameters in the test functions.
# Ruff reads that as F811 (redefined-while-unused) — false positive.
"**/tests/**/test_*.py" = ["F811"]
"tests/**/test_*.py" = ["F811"]
# String type-annotations referencing not-yet-imported modules. The
# annotation is evaluated lazily; ruff can't tell it's resolved at
# runtime via __future__ annotations elsewhere.
"services/realtime/tests/conftest.py" = ["F821"]
