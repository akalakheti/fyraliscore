services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: company_os_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: company_os
      POSTGRES_PASSWORD: company_os
      POSTGRES_DB: company_os
    ports:
      - "5432:5432"
    volumes:
      - company_os_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U company_os -d company_os"]
      interval: 5s
      timeout: 3s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    container_name: company_os_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - company_os_ollama:/root/.ollama
    # Pull the embed model on first run. Safe on re-run — Ollama
    # skips the pull if the model is already present.
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama serve & sleep 3 &&
       ollama pull nomic-embed-text &&
       wait"

  gateway:
    build: .
    container_name: company_os_gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://company_os:company_os@postgres:5432/company_os
      OLLAMA_URL: http://ollama:11434
      COMPANY_OS_ENV: prod
      GATEWAY_MOUNT_SIM: "1"
      GATEWAY_START_GRT_SCHEDULER: "1"
      GATEWAY_OWNS_POOL: "1"
    env_file: .env.production
    expose:
      - "8000"

  think_worker:
    build: .
    container_name: company_os_think_worker
    command: python scripts/run_think_worker.py
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://company_os:company_os@postgres:5432/company_os
      OLLAMA_URL: http://ollama:11434
    env_file: .env.production

  post_commit_worker:
    build: .
    container_name: company_os_post_commit_worker
    command: python scripts/run_post_commit_worker.py
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://company_os:company_os@postgres:5432/company_os
    env_file: .env.production

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: company_os_ui
    restart: unless-stopped
    expose:
      - "80"
    environment:
      VIRTUAL_HOST: demo.fyralis.xyz
      LETSENCRYPT_HOST: demo.fyralis.xyz
      LETSENCRYPT_EMAIL: rachin.kalakheti@gmail.com

  nginx-proxy:
    image: nginxproxy/nginx-proxy:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - nginx-certs:/etc/nginx/certs
      - ./nginx/vhost.d:/etc/nginx/vhost.d
      - nginx-html:/usr/share/nginx/html

  acme-companion:
    image: nginxproxy/acme-companion
    container_name: acme-companion
    restart: unless-stopped
    environment:
      DEFAULT_EMAIL: rachin.kalakheti@gmail.com
    volumes_from:
      - nginx-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - acme:/etc/acme.sh

volumes:
  company_os_pgdata:
  company_os_ollama:
  nginx-certs:
  nginx-html:
  acme:
