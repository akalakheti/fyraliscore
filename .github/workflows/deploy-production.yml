name: Deploy to Production

on:
  push:
    branches: [production]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to AWS Lightsail
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/fyraliscore

            PREV_SHA=$(git rev-parse HEAD)
            echo "==> Previous SHA: ${PREV_SHA}"

            echo "==> Pulling latest code"
            git fetch origin production
            git reset --hard origin/production

            NEW_SHA=$(git rev-parse HEAD)
            echo "==> New SHA: ${NEW_SHA}"

            echo "==> Rebuilding and restarting containers"
            docker compose up -d --build --remove-orphans

            echo "==> Waiting for gateway health check"
            if ! timeout 60 bash -c 'until curl -sf http://localhost:8000/healthz; do sleep 3; done'; then
              echo "==> Health check FAILED — rolling back to ${PREV_SHA}"
              git reset --hard "${PREV_SHA}"
              docker compose up -d --build --remove-orphans
              echo "==> Rolled back. Failing the job so the bad commit is visible."
              exit 1
            fi

            echo "==> Deployment complete (live SHA: ${NEW_SHA})"
            docker compose ps
