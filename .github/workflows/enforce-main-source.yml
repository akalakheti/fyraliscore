name: Enforce main source

on:
  pull_request:
    branches: [production]

jobs:
  check-source:
    name: enforce-main-source
    runs-on: ubuntu-latest
    steps:
      - name: Fail if source branch is not main
        if: github.head_ref != 'main'
        run: |
          echo "PRs to production must come from main."
          echo "Got: ${{ github.head_ref }}"
          exit 1
      - name: OK
        run: echo "Source branch is main. Good to go."
